{% extends "layout.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container text-center">
        <div class="card shadow-sm border-0 mx-auto" style="max-width: 560px;">
            <div class="card-body p-5">
                <p class="text-muted fw-semibold mb-2">{{ code }}</p>
                <h1 class="fw-bold mb-3">{{ title }}</h1>
                <p class="text-muted mb-4">{{ message }}</p>
                <a href="{{ url_for('main.index') }}" class="btn btn-dark rounded-pill px-4">Go home</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
